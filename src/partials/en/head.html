  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Primary meta -->
  <title>{{title}}</title>
  <meta name="description" content="{{description}}">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="{{canonical}}">

  <!-- Favicon -->
  <link rel="icon" href="../assets/beausejour-icon-black.svg" type="image/svg+xml">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:locale" content="en_CA">
  <meta property="og:site_name" content="Groupe Beauséjour">
  <meta property="og:title" content="{{title}}">
  <meta property="og:description" content="{{description}}">
  <meta property="og:url" content="{{canonical}}">
  <meta property="og:image" content="https://etiennestortech.github.io/depanneur-beausejour/assets/hero-bg-v2.jpg">
  <meta property="og:image:width" content="2560">
  <meta property="og:image:height" content="1780">
  <meta property="og:image:alt" content="Groupe Beauséjour — convenience stores in Abitibi">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{title}}">
  <meta name="twitter:description" content="{{description}}">
  <meta name="twitter:image" content="https://etiennestortech.github.io/depanneur-beausejour/assets/hero-bg-v2.jpg">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css">
  <link rel="stylesheet" href="../styles.css">
