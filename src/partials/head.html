  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- @if heroImage -->
  <link rel="preload" as="image" href="{{heroImage}}" fetchpriority="high">
  <!-- @endif -->
  <script>
    // Set before paint so CSS can pre-hide hero text and prevent FOUC.
    // Removed if user prefers reduced motion or JS is disabled.
    if (!window.matchMedia || !window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      document.documentElement.classList.add('js-anim');
      // Safety net: if GSAP fails to load or intro doesn't run within 2.5s,
      // reveal everything so content is never permanently hidden.
      setTimeout(function () {
        document.documentElement.classList.remove('js-anim');
      }, 2500);
    }
  </script>
  <noscript><style>.js-anim [data-reveal-text],.js-anim .eyebrow,.js-anim .inner-hero-desc,.js-anim .page-description,.js-anim .simple-hero-desc,.js-anim .about-hero-ribbon{opacity:1 !important;}</style></noscript>

  <!-- Primary meta -->
  <title>{{title}}</title>
  <meta name="description" content="{{description}}">

  <!-- Favicon -->
  <link rel="icon" href="./assets/beausejour-icon-black.svg" type="image/svg+xml">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:locale" content="fr_CA">
  <meta property="og:site_name" content="Groupe Beauséjour">
  <meta property="og:title" content="{{title}}">
  <meta property="og:description" content="{{description}}">
  <meta property="og:url" content="{{canonical}}">
  <meta property="og:image" content="https://etiennestortech.github.io/depanneur-beausejour/assets/hero-bg-v2.jpg">
  <meta property="og:image:width" content="2560">
  <meta property="og:image:height" content="1780">
  <meta property="og:image:alt" content="Groupe Beauséjour — magasins de proximité en Abitibi">
